add_newline = false

[directory]
truncation_length = 0
truncate_to_repo = false
truncation_symbol = ''

[username]
show_always = true
style_user = 'bold white'
style_root = 'bold red'
format = '[$user]($style)'

[hostname]
ssh_only = false
format = '[@$hostname]($style) '
style = 'dimmed white'

[character]
success_symbol = '[\$](bold green)'
error_symbol = '[\$](bold red)'

[package]
disabled = true

[git_status]
format = '([\($all_status$ahead_behind\)]($style)) '
style = 'cyan'

[cmd_duration]
format = '[$duration]($style) '
style = 'yellow'

[rust]
symbol = 'rust '
