
setw -g automatic-rename off

set -g status-left '[#S]'
set -g status-right "%H:%M "
set -g clock-mode-style 24

# Start window and pane indexing at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1

# Re-number windows sequentially when one is closed
set -g renumber-windows on

# Reload the config file easily (default prefix + r)
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Split panes using | and - for a more intuitive feel (Prefix + | and Prefix + -)
bind | split-window -h
bind - split-window -v

# Easy pane navigation using Prefix + h/j/k/l (like Vim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes using Shift + Arrow keys (Prefix + H/J/K/L)
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Toggle between last two windows (like Alt+Tab)
bind Tab last-window
